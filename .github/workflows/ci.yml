name: regression

# Runs the LLM-free regression gate (`run_regression.py --fast`): the full
# pytest suite, the guarded scripts, and every REQUIRES_LLM=False demo. The
# LLM-dependent items (synthesize / conversion / rung end-to-end arcs) are
# excluded by design -- they need the Claude CLI + an API key, which CI has not.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"   # weekly: the Lean toolchain job

jobs:
  fast:
    # two parallel shards (the harness owns the split: run_regression --split);
    # rapid pushes supersede each other -- cancel the stale gate run.  The
    # matrix key MUST be in the concurrency group or the shards cancel each
    # other.
    strategy:
      fail-fast: false
      matrix:
        split: [pytest, demos]
    concurrency:
      group: fast-${{ github.ref }}-${{ github.event_name }}-${{ matrix.split }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    # Every outsourced checker (Dafny, Kaitai, tree-sitter, the flloat closure,
    # all python deps in the SYSTEM interpreter the sandbox uses) is BAKED into
    # the toolchain image (ci/Dockerfile, rebuilt by toolchain-image.yml when it
    # changes) -- the gate no longer pays ~6 min of per-push installs.
    # --privileged: the OS sandbox needs unshare/setpriv.  The devcontainer
    # points at the same image, so local dev == CI.
    container:
      image: ghcr.io/jamesdchen/cgb-toolchain:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CGB_KSC_CLASSPATH: /opt/ksc/lib/*
    steps:
      - uses: actions/checkout@v4

      - name: Regression gate (--fast)
        run: |
          # the container runs as root: unshare/setpriv work directly, no sudo.
          export PATH="$PATH:/root/.dotnet/tools:/root/.cargo/bin"
          python3 run_regression.py --fast --split "${{ matrix.split }}"

  # F0: the Lean 4 + pinned-Mathlib toolchain job (FORMALIZATION.md).
  # Opt-in (manual dispatch) or weekly -- NOT on every push: the fast gate
  # stays Lean-free by design (run_regression --fast is Lean-free, F0.1), and
  # this job's first runs are expected to need shakeout (the backend code has
  # never executed against a real toolchain).  `lake exe cache get` downloads
  # Mathlib's PREBUILT oleans, so this is a fetch (~5 GB), not an hours-long
  # source build; the once-per-pin `lean4checker --fresh` recertification is
  # deliberately deferred (--skip-fresh) with the honest note L4 requires --
  # run setup WITHOUT --skip-fresh on a many-core host to discharge it.
  lean:
    # also fires on a push whose commit message carries the [lean-ci] marker --
    # workflow_dispatch needs actions:write, which the bot token lacks.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[lean-ci]'))
    # shakeout rounds supersede each other; lean-fresh (below) is NEVER
    # cancelled -- a partial recert is still progress.
    concurrency:
      group: lean-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore the pinned toolchain + Mathlib cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Save the toolchain cache EVEN ON FAILURE (shakeout rounds must
              not re-fetch Mathlib every time)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}

      - name: Python packages (the Lean-gated tests' imports)
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis z3-solver cvc5 pytest pydantic jsonschema pyyaml

      - name: Lean 4 + pinned Mathlib + lean4checker (setup.sh)
        run: bash setup.sh --with-lean --lean-only --skip-fresh

      - name: Diagnostics (informational -- pinpoints shakeout causes in one run)
        run: |
          set +e
          export PATH="$HOME/.elan/bin:$PATH"
          echo "== elan toolchains (verifies the mangled dir name) =="
          ls ~/.elan/toolchains/
          echo "== mathlib checkout + build lib =="
          ls .lean/ && ls .lean/mathlib/.lake/build/lib 2>/dev/null | head -5
          echo "== per-module import probe (which pinned names are real at this pin?) =="
          cd .lean/mathlib
          for m in $(python -c "import sys; sys.path.insert(0,'$GITHUB_WORKSPACE'); import common; print(' '.join(common.MATHLIB_IMPORTS))"); do
            echo "import $m" > /tmp/probe.lean
            if lake env lean /tmp/probe.lean >/tmp/probe.log 2>&1; then
              echo "OK    $m"
            else
              echo "FAIL  $m"; head -3 /tmp/probe.log | sed 's/^/      /'
            fi
          done
          cd "$GITHUB_WORKSPACE"
          echo "== IN-JAIL introspection (settles the lake-detection question) =="
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env "PATH=$HOME/.elan/bin:$PATH" "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -c "
          import common
          from sandbox import Sandbox
          mounts = {'mathlib': common.LEAN_MATHLIB_DIR,
                    'toolchain': common.LEAN_TOOLCHAIN_DIR}
          with Sandbox(ro_mounts=mounts) as sb:
              for argv in (['ls', '/ro/toolchain/bin'],
                           ['bash', '-c', 'readlink /proc/self/exe; echo pid=\$\$'],
                           ['/ro/toolchain/bin/lean', '--version'],
                           ['/ro/toolchain/bin/lake', '--version']):
                  r = sb.run(argv, extra_path=('/ro/toolchain/bin',),
                             extra_env={'LEAN_SYSROOT': '/ro/toolchain',
                                        'LAKE_HOME': '/ro/toolchain'})
                  print('--', argv, 'ok=', r.ok)
                  print((r.stdout + r.stderr).decode(errors='replace')[:400])
          " || true
          echo "== raw probes of EVERY backend surface (parallelizes the unknowns:"
          echo "   one run answers elaborate AND recheck AND eval_props AND pp_roundtrip) =="
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env "PATH=$HOME/.elan/bin:$PATH" "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -c "
          import json
          from kernel.backends import LeanBackend
          be = LeanBackend()
          stmt = 'theorem cgb_probe : ∀ (n : Int), n ∣ n := sorry'
          el = be.elaborate(stmt, expect_sorry=True)
          print('--- elaborate ---')
          print(json.dumps(el, indent=2, default=str)[:2500])
          if el.get('olean_path'):
              rc = be.recheck(el['olean_path'])
              print('--- recheck ---')
              print(json.dumps(rc, indent=2, default=str)[:2500])
          ev = be.eval_props('', ['1 + 1 = 2', '(2 : Int) % 2 = 0'])
          print('--- eval_props ---')
          print(json.dumps(ev, indent=2, default=str)[:2000])
          pp = be.pp_roundtrip(stmt)
          print('--- pp_roundtrip ---')
          print(json.dumps(pp, indent=2, default=str)[:2500])
          "
          true

      - name: "Lean-gated tests + the five-teeth demo (root -- the sandbox needs unshare)"
        run: |
          # sudo changes $HOME, so the elan-derived toolchain dir must be pinned
          # explicitly (common.LEAN_TOOLCHAIN_DIR expands ~ at import time).
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -m pytest \
            tests/test_lean_backend.py tests/test_statement_cert.py \
            tests/test_formalize_pipeline.py tests/test_lean_positive_path.py -q
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" demo_formalize.py

      - name: Make lean transcripts readable (pytest ran under sudo, so
              /tmp/cgb-lean-* is root-owned and the uploader EACCESes)
        if: failure()
        run: sudo chmod -R a+rX /tmp/cgb-lean-* 2>/dev/null || true

      - name: Upload lean transcripts on failure (one-click debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lean-transcripts-${{ github.run_id }}
          path: /tmp/cgb-lean-*
          if-no-files-found: ignore
          retention-days: 7

  # The once-per-pin L4 debt, paid on a PARALLEL runner: `lean4checker --fresh`
  # recertifies every imported Mathlib olean.  Opt-in ([lean-fresh] marker or
  # manual dispatch) because it is a LONG many-core job (may exhaust the 6h
  # runner limit on 4 cores -- an honest partial result still narrows the debt).
  # Runs concurrently with the `lean` shakeout job; they share the pin cache.
  lean-fresh:
    # Latency split: dispatch/[lean-fresh] runs pay the IMPORT-SURFACE debt
    # (minutes -- shared-env + --fresh over common.MATHLIB_IMPORTS); the
    # weekly scheduled run pays the WHOLE-LIBRARY replay (hours).  Both are
    # honest L4 payments; setup.sh prints which scope ran.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[lean-fresh]'))
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    # a superseded recertification run must not burn hours to completion
    concurrency:
      group: lean-fresh-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-
      # the once-per-pin fresh LEDGER (setup.sh writes .lean/fresh_discharged
      # .txt): restored from the newest prior run of this pin, saved below
      # under a run-unique key so each run's newly-discharged debt persists --
      # a warm re-trigger pays only the missing modules (minutes -> seconds).
      - uses: actions/cache/restore@v4
        with:
          path: .lean/fresh_discharged.txt
          key: lean-fresh-ledger-v2-${{ runner.os }}-${{ hashFiles('.lean-pins') }}-${{ github.run_id }}
          restore-keys: lean-fresh-ledger-v2-${{ runner.os }}-${{ hashFiles('.lean-pins') }}-
      - name: Full setup INCLUDING the fresh recertification (no --skip-fresh)
        # scheduled runs pay the whole-library replay; everything else the
        # low-latency import-surface scope.
        run: >-
          bash setup.sh --with-lean --lean-only
          ${{ github.event_name != 'schedule' && '--fresh-imports-only' || '' }}
      # persist the ledger EVEN ON FAILURE/CANCEL -- partial discharge is the
      # whole point (an interrupted run's paid debt must not be re-paid).
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .lean/fresh_discharged.txt
          key: lean-fresh-ledger-v2-${{ runner.os }}-${{ hashFiles('.lean-pins') }}-${{ github.run_id }}
