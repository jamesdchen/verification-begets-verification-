name: regression

# Runs the LLM-free regression gate (`run_regression.py --fast`): the full
# pytest suite, the guarded scripts, and every REQUIRES_LLM=False demo. The
# LLM-dependent items (synthesize / conversion / rung end-to-end arcs) are
# excluded by design -- they need the Claude CLI + an API key, which CI has not.
on:
  push:
    branches: ["**"]
    # docs/ledger-only pushes skip CI entirely (the reflection driver
    # updates PLAN_REFLECT.md every iteration).  NOTE: an md-only commit
    # cannot fire the lean lanes either -- touch a code file to tag
    # [lean-ci]/[lean-fast].
    paths-ignore: ["**.md", "results/**"]
  pull_request:
    paths-ignore: ["**.md", "results/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"   # weekly: the Lean toolchain job

jobs:
  fast:
    # two parallel shards (the harness owns the split: run_regression --split);
    # rapid pushes supersede each other -- cancel the stale gate run.  The
    # matrix key MUST be in the concurrency group or the shards cancel each
    # other.
    # DEDUP: branch pushes get their fast gate through the PR's
    # pull_request run; the push event runs it only on main.  Before
    # this, every branch push ran the whole matrix TWICE.
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        split: [pytest-a, pytest-b, demos]
    concurrency:
      group: fast-${{ github.ref }}-${{ github.event_name }}-${{ matrix.split }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    # Every outsourced checker (Dafny, Kaitai, tree-sitter, the flloat closure,
    # all python deps in the SYSTEM interpreter the sandbox uses) is BAKED into
    # the toolchain image (ci/Dockerfile, rebuilt by toolchain-image.yml when it
    # changes) -- the gate no longer pays ~6 min of per-push installs.
    # --privileged: the OS sandbox needs unshare/setpriv.  The devcontainer
    # points at the same image, so local dev == CI.
    container:
      image: ghcr.io/jamesdchen/cgb-toolchain:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CGB_KSC_CLASSPATH: /opt/ksc/lib/*
    steps:
      - uses: actions/checkout@v4

      - name: Regression gate (--fast)
        run: |
          # the container runs as root: unshare/setpriv work directly, no sudo.
          export PATH="$PATH:/root/.dotnet/tools:/root/.cargo/bin"
          python3 run_regression.py --fast --split "${{ matrix.split }}"

  # F0: the Lean 4 + pinned-Mathlib toolchain job (FORMALIZATION.md).
  # Opt-in (manual dispatch) or weekly -- NOT on every push: the fast gate
  # stays Lean-free by design (run_regression --fast is Lean-free, F0.1), and
  # this job's first runs are expected to need shakeout (the backend code has
  # never executed against a real toolchain).  `lake exe cache get` downloads
  # Mathlib's PREBUILT oleans, so this is a fetch (~5 GB), not an hours-long
  # source build; the once-per-pin `lean4checker --fresh` recertification is
  # deliberately deferred (--skip-fresh) with the honest note L4 requires --
  # run setup WITHOUT --skip-fresh on a many-core host to discharge it.
  lean:
    # also fires on a push whose commit message carries the [lean-ci] marker --
    # workflow_dispatch needs actions:write, which the bot token lacks.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       (contains(github.event.head_commit.message, '[lean-ci]') ||
        contains(github.event.head_commit.message, '[lean-fast]')))
    # shakeout rounds supersede each other; lean-fresh (below) is NEVER
    # cancelled -- a partial recert is still progress.
    concurrency:
      group: lean-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    # id-token/attestations: the runner SIGNS the agreement ledger it
    # produced (Sigstore provenance via GitHub OIDC), so a committed row's
    # provenance is verifiable by signature instead of by walking run logs:
    #   gh attestation verify results/reflect_agreement.jsonl \
    #     --repo jamesdchen/verification-begets-verification-
    # NOTE (trust honesty): this makes GitHub's OIDC + Sigstore the
    # ATTESTOR of provenance -- naming them on the trusted surface is a
    # TRUST.md decision reserved for the maintainer's ceremony; the wiring
    # here is reversible CI config and attests provenance, never correctness.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore the pinned toolchain + Mathlib cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Save the toolchain cache EVEN ON FAILURE (shakeout rounds must
              not re-fetch Mathlib every time)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}

      - name: Python packages (the Lean-gated tests' imports)
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis z3-solver cvc5 pytest pydantic jsonschema pyyaml

      - name: Lean 4 + pinned Mathlib + lean4checker (setup.sh)
        run: bash setup.sh --with-lean --lean-only --skip-fresh

      - name: "Lean-gated tests + the five-teeth demo (root -- the sandbox needs unshare)"
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # sudo changes $HOME, so the elan-derived toolchain dir must be pinned
          # explicitly (common.LEAN_TOOLCHAIN_DIR expands ~ at import time).
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          # [lean-fast] = the reflection driver's inner loop: reflection/
          # shadow/flywheel teeth only.  [lean-ci] / schedule / dispatch
          # (empty HEAD_MSG) = the full Lean-gated suite.
          if [[ "$HEAD_MSG" == *"[lean-fast]"* && "$HEAD_MSG" != *"[lean-ci]"* ]]; then
            SUITE="tests/test_fg_reflect_lean.py tests/test_lanes_growth_flywheel.py tests/test_reflect_shadow.py"
          else
            SUITE="tests/test_lean_backend.py tests/test_statement_cert.py tests/test_formalize_pipeline.py tests/test_lean_positive_path.py tests/test_fg_reflect_lean.py tests/test_lanes_growth_flywheel.py tests/test_reflect_shadow.py"
          fi
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -m pytest $SUITE -q
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" demo_formalize.py

      - name: "Reflect-shadow sweep -> agreement ledger (S4a': rows must outlive the runner)"
        run: |
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "GITHUB_RUN_ID=$GITHUB_RUN_ID" \
            "$(command -v python)" run/reflect_shadow.py \
              --out /tmp/reflect_shadow_report.json \
              --ledger results/reflect_agreement.jsonl
          sudo chmod a+r results/reflect_agreement.jsonl /tmp/reflect_shadow_report.json
          echo "ledger digest (recorded in the run log, S4a' provenance):"
          sha256sum results/reflect_agreement.jsonl

      - name: Upload agreement ledger + sweep report (the driver session commits the ledger back; the report carries disagreement transcripts)
        uses: actions/upload-artifact@v4
        with:
          name: reflect-agreement-${{ github.run_id }}
          path: |
            results/reflect_agreement.jsonl
            /tmp/reflect_shadow_report.json
          retention-days: 30

      - name: Attest ledger provenance (the runner signs the bytes it produced)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: results/reflect_agreement.jsonl

      - name: Diagnostics (failure-only -- the shakeout era is over)
        if: failure()
        run: |
          set +e
          export PATH="$HOME/.elan/bin:$PATH"
          echo "== elan toolchains (verifies the mangled dir name) =="
          ls ~/.elan/toolchains/
          echo "== mathlib checkout + build lib =="
          ls .lean/ && ls .lean/mathlib/.lake/build/lib 2>/dev/null | head -5
          echo "== per-module import probe (which pinned names are real at this pin?) =="
          cd .lean/mathlib
          for m in $(python -c "import sys; sys.path.insert(0,'$GITHUB_WORKSPACE'); import common; print(' '.join(common.MATHLIB_IMPORTS))"); do
            echo "import $m" > /tmp/probe.lean
            if lake env lean /tmp/probe.lean >/tmp/probe.log 2>&1; then
              echo "OK    $m"
            else
              echo "FAIL  $m"; head -3 /tmp/probe.log | sed 's/^/      /'
            fi
          done
          cd "$GITHUB_WORKSPACE"
          echo "== IN-JAIL introspection (settles the lake-detection question) =="
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env "PATH=$HOME/.elan/bin:$PATH" "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -c "
          import common
          from sandbox import Sandbox
          mounts = {'mathlib': common.LEAN_MATHLIB_DIR,
                    'toolchain': common.LEAN_TOOLCHAIN_DIR}
          with Sandbox(ro_mounts=mounts) as sb:
              for argv in (['ls', '/ro/toolchain/bin'],
                           ['bash', '-c', 'readlink /proc/self/exe; echo pid=\$\$'],
                           ['/ro/toolchain/bin/lean', '--version'],
                           ['/ro/toolchain/bin/lake', '--version']):
                  r = sb.run(argv, extra_path=('/ro/toolchain/bin',),
                             extra_env={'LEAN_SYSROOT': '/ro/toolchain',
                                        'LAKE_HOME': '/ro/toolchain'})
                  print('--', argv, 'ok=', r.ok)
                  print((r.stdout + r.stderr).decode(errors='replace')[:400])
          " || true
          echo "== raw probes of EVERY backend surface (parallelizes the unknowns:"
          echo "   one run answers elaborate AND recheck AND eval_props AND pp_roundtrip) =="
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env "PATH=$HOME/.elan/bin:$PATH" "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -c "
          import json
          from kernel.backends import LeanBackend
          be = LeanBackend()
          stmt = 'theorem cgb_probe : ∀ (n : Int), n ∣ n := sorry'
          el = be.elaborate(stmt, expect_sorry=True)
          print('--- elaborate ---')
          print(json.dumps(el, indent=2, default=str)[:2500])
          if el.get('olean_path'):
              rc = be.recheck(el['olean_path'])
              print('--- recheck ---')
              print(json.dumps(rc, indent=2, default=str)[:2500])
          ev = be.eval_props('', ['1 + 1 = 2', '(2 : Int) % 2 = 0'])
          print('--- eval_props ---')
          print(json.dumps(ev, indent=2, default=str)[:2000])
          pp = be.pp_roundtrip(stmt)
          print('--- pp_roundtrip ---')
          print(json.dumps(pp, indent=2, default=str)[:2500])
          "
          true

      - name: Make lean transcripts readable (pytest ran under sudo, so
              /tmp/cgb-lean-* is root-owned and the uploader EACCESes)
        if: failure()
        run: sudo chmod -R a+rX /tmp/cgb-lean-* 2>/dev/null || true

      - name: Upload lean transcripts on failure (one-click debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lean-transcripts-${{ github.run_id }}
          path: /tmp/cgb-lean-*
          if-no-files-found: ignore
          retention-days: 7

  # The once-per-pin L4 debt, paid on a PARALLEL runner: `lean4checker --fresh`
  # recertifies every imported Mathlib olean.  Opt-in ([lean-fresh] marker or
  # manual dispatch) because it is a LONG many-core job (may exhaust the 6h
  # runner limit on 4 cores -- an honest partial result still narrows the debt).
  # Runs concurrently with the `lean` shakeout job; they share the pin cache.
  lean-fresh:
    # Latency split: dispatch/[lean-fresh] runs pay the IMPORT-SURFACE debt
    # (minutes -- shared-env + --fresh over common.MATHLIB_IMPORTS); the
    # weekly scheduled run pays the WHOLE-LIBRARY replay (hours).  Both are
    # honest L4 payments; setup.sh prints which scope ran.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[lean-fresh]'))
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    # a superseded recertification run must not burn hours to completion
    concurrency:
      group: lean-fresh-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-
      # the once-per-pin fresh LEDGER (setup.sh writes .lean/fresh_discharged
      # .txt): restored from the newest prior run of this pin, saved below
      # under a run-unique key so each run's newly-discharged debt persists --
      # a warm re-trigger pays only the missing modules (minutes -> seconds).
      - uses: actions/cache/restore@v4
        with:
          path: .lean/fresh_discharged.txt
          key: lean-fresh-ledger-v2-${{ runner.os }}-${{ hashFiles('.lean-pins') }}-${{ github.run_id }}
          restore-keys: lean-fresh-ledger-v2-${{ runner.os }}-${{ hashFiles('.lean-pins') }}-
      - name: Full setup INCLUDING the fresh recertification (no --skip-fresh)
        # scheduled runs pay the whole-library replay; everything else the
        # low-latency import-surface scope.
        run: >-
          bash setup.sh --with-lean --lean-only
          ${{ github.event_name != 'schedule' && '--fresh-imports-only' || '' }}
      # persist the ledger EVEN ON FAILURE/CANCEL -- partial discharge is the
      # whole point (an interrupted run's paid debt must not be re-paid).
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .lean/fresh_discharged.txt
          key: lean-fresh-ledger-v2-${{ runner.os }}-${{ hashFiles('.lean-pins') }}-${{ github.run_id }}

  # FI-KA-5: the LEAN SMOKE lane (KA_INTERFACES.md).  Proves the SEAM in ~10-15
  # warm minutes -- toolchain up, all four LeanBackend surfaces live, and both
  # the statement-cert and proof-cert dispatch paths the anchor reuses mint a
  # Certificate end-to-end.  It does NOT run the suite (that is the `lean` job's
  # 120-min budget) and it does NOT replace the mint gate: WP-KA builders may
  # LAUNCH on this lane green, but the first anchor certificate against the
  # committed corpus still requires the full `lean` job green (frozen gate
  # semantics, KA_INTERFACES.md FI-KA-5).  Everything here ASSERTS: green-by-skip
  # is impossible (step 1 hard-asserts the toolchain), the probes are pinned to
  # `decide`-closable facts only (no norm_num/simp heartbeat variance in the
  # gate), and the concurrency group is its OWN (never shared with `lean`, which
  # would cancel one lane with the other).
  lean-smoke:
    # self-serve gate (§12.8): manual dispatch, the weekly schedule, or a push
    # whose head commit carries [lean-smoke] OR [lean-ci] -- [lean-ci] fires the
    # full lane too, so the current shakeout round exercises smoke for free.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       (contains(github.event.head_commit.message, '[lean-smoke]') ||
        contains(github.event.head_commit.message, '[lean-ci]')))
    # OWN group -- MUST NOT be shared with `lean`: a shared group would cancel
    # one lane with the other.  Superseded smoke rounds supersede each other.
    concurrency:
      group: lean-smoke-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore the pinned toolchain + Mathlib cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Save the toolchain cache EVEN ON FAILURE (shakeout rounds must
              not re-fetch Mathlib every time)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}

      - name: Python packages (the Lean-gated tests' imports)
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis z3-solver cvc5 pytest pydantic jsonschema pyyaml

      - name: Lean 4 + pinned Mathlib + lean4checker (setup.sh)
        run: bash setup.sh --with-lean --lean-only --skip-fresh

      - name: "Smoke -- assert the whole Lean seam is live (toolchain + 4 backend surfaces + both cert paths; root -- the sandbox needs unshare)"
        run: |
          # set -e semantics: any assert failure sys.exit(1)s the job.  sudo
          # changes $HOME, so the elan-derived toolchain dir must be pinned
          # explicitly (common.LEAN_TOOLCHAIN_DIR expands ~ at import time) --
          # byte-identical to the `lean` job's asserting steps.
          set -euo pipefail
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" - <<'PY'
          import sys
          import common
          import kernel
          from kernel.certs import Certificate
          from kernel.backends import LeanBackend

          def die(msg):
              print("SMOKE FAIL:", msg)
              sys.exit(1)

          STD = {"propext", "Classical.choice", "Quot.sound"}

          # (1) Toolchain is ACTUALLY present -- hard assert, fail never skip
          #     (the green-by-skip trap: smoke must never go green by honest
          #     degradation in a toolchain-less runner).
          if common.lean_available() is not True:
              die("common.lean_available() is not True -- refusing to go green by honest degradation")
          print("OK  (1) common.lean_available() is True")

          be = LeanBackend()

          # (2) The four LeanBackend surfaces, one probe each, all ASSERTING.
          sorry_stmt = 'theorem cgb_probe : ∀ (n : Int), n ∣ n := sorry'
          el = be.elaborate(sorry_stmt, expect_sorry=True)
          if not el.get("ok"):
              die(f"elaborate(sorry probe) not ok: {el}")
          olean = el.get("olean_path")
          if not olean:
              die(f"elaborate(sorry probe) produced no olean_path: {el}")
          print("OK  (2a) elaborate(sorry probe).ok")

          rc = be.recheck(olean)
          axioms = list(rc.get("axioms", []))
          if not (rc.get("ok") and rc.get("audited") and axioms == ["sorryAx"]):
              die(f"recheck(olean): ok={rc.get('ok')} audited={rc.get('audited')} axioms={axioms} (want ok+audited+['sorryAx'])")
          print("OK  (2b) recheck(olean).ok + audited + axioms == ['sorryAx']")

          # decide ONLY -- norm_num/simp heartbeat variance stays out of the gate.
          ev = be.eval_props('', ['1 + 1 = 2'])
          if ev[0].get("closed_by") != "decide":
              die(f"eval_props('', ['1 + 1 = 2'])[0].closed_by == {ev[0].get('closed_by')!r} (want 'decide')")
          print("OK  (2c) eval_props decide-closes '1 + 1 = 2'")

          pp = be.pp_roundtrip(sorry_stmt)
          if not pp.get("ok"):
              die(f"pp_roundtrip(stmt) not ok: {pp}")
          print("OK  (2d) pp_roundtrip(stmt).ok")

          # (3) Both cert paths the anchor reuses, one statement each -- each must
          #     mint a Certificate via kernel.check.  Passing fidelity channels
          #     are supplied so the seam (kernel dispatch -> adjudicate) is what
          #     is under test; the kernel leg is real (Lean is up).
          PIN = common.MATHLIB_IMPORTS[0]
          fidelity = [
              {"backend": "smoke-fidelity-a", "result": "pass",
               "role": "cross-impl-differential", "detail": "smoke seam probe -- fidelity is the pipeline's job, not the seam's"},
              {"backend": "smoke-fidelity-b", "result": "pass",
               "role": "behavioral-witness", "detail": "smoke seam probe -- fidelity is the pipeline's job, not the seam's"},
          ]

          # (3a) statement-cert for one committed forall reading.
          stmt_text = f"import {PIN}\ntheorem cgb_smoke_stmt : ∀ (n : Int), n ∣ n := sorry\n"
          stmt_contract = {
              "type": "statement-cert",
              "lean_text": stmt_text,
              "statement_hash": common.sha256_bytes(stmt_text.encode()),
              "fidelity_channels": fidelity,
              "mathlib_commit": common.MATHLIB_COMMIT,
              "toolchain": common.LEAN_TOOLCHAIN,
              "import_set": list(common.MATHLIB_IMPORTS),
          }
          sc = kernel.check({"kind": "lean-statement", "files": {}}, stmt_contract)
          if not isinstance(sc, Certificate):
              die(f"statement-cert did not mint a Certificate: {type(sc).__name__}: {sc}")
          print("OK  (3a) statement-cert minted a Certificate")

          # (3b) the fixed trivial proof-cert.
          proof_text = (f"import {PIN}\n"
                        "theorem cgb_smoke : ∀ (n : Int), n ∣ n := by intro n; exact dvd_refl n\n")
          proof_contract = {
              "type": "proof-cert",
              "lean_text": proof_text,
              "proof_hash": common.sha256_bytes(proof_text.encode()),
              "statement_hash": common.sha256_bytes(stmt_text.encode()),
              "fidelity_channels": fidelity,
              "mathlib_commit": common.MATHLIB_COMMIT,
              "toolchain": common.LEAN_TOOLCHAIN,
              "import_set": list(common.MATHLIB_IMPORTS),
          }
          pc = kernel.check({"kind": "lean-statement", "files": {}}, proof_contract)
          if not isinstance(pc, Certificate):
              die(f"proof-cert did not mint a Certificate: {type(pc).__name__}: {pc}")

          # explicit run-2 audit on the proof olean: NO sorryAx, axioms subset of
          # the standard three (the kernel leg enforces this to mint; asserted
          # here directly per FI-KA-5 step 3).
          pel = be.elaborate(proof_text, expect_sorry=False)
          if not pel.get("ok") or not pel.get("olean_path"):
              die(f"proof-cert elaborate not ok: {pel}")
          prc = be.recheck(pel["olean_path"])
          paxioms = set(prc.get("axioms", []))
          if "sorryAx" in paxioms:
              die(f"proof-cert run-2 audit found sorryAx: {sorted(paxioms)}")
          if not paxioms <= STD:
              die(f"proof-cert axioms outside the standard three: {sorted(paxioms - STD)}")
          print(f"OK  (3b) proof-cert minted; run-2 audit axioms={sorted(paxioms)} (no sorryAx, subset of the three)")

          print("SMOKE PASS: toolchain live, all four backend surfaces asserted, both cert paths mint end-to-end")
          PY

  # WP-LI2 Phase B (PLAN_LEAN_IMPORT.md §2/§3): the RT differential batch --
  # the answer to "how do we know an authored reading means what the ORIGINAL
  # declaration means."  Runs run/import_rt.rt_batch over every authored
  # reading against the pinned toolchain: defeq/proved/failed/deferred per
  # row, failed rows flip to refused (a measured mistranslation, first-class),
  # report committed back.  authored -> imported flips stay OUT of this lane:
  # that requires the statement-cert mint too (dual-channel rule) and is
  # recorded as pending in the report until wired.
  lean-rt:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[lean-rt]'))
    permissions:
      contents: write
    concurrency:
      group: lean-rt-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore the pinned toolchain + Mathlib cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Save the toolchain cache EVEN ON FAILURE
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}

      - name: Python packages
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis z3-solver cvc5 pytest pydantic jsonschema pyyaml

      - name: Lean 4 + pinned Mathlib + lean4checker (setup.sh)
        run: bash setup.sh --with-lean --lean-only --skip-fresh

      - name: "RT differential batch (root -- the sandbox needs unshare)"
        run: |
          set -euo pipefail
          test -d specs/mathsources/mathlib/readings || { echo "no authored readings on this ref"; exit 1; }
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -m run.import_rt
          sudo chmod -R a+rX results/ 2>/dev/null || true
          python3 - <<'PY'
          import json
          r = json.load(open("results/import_rt_report.json"))
          from collections import Counter
          c = Counter(v.get("verdict") for v in r.get("rows", r.get("verdicts", {})).values()) \
              if isinstance(r.get("rows", r.get("verdicts")), dict) else Counter()
          print("RT verdicts:", dict(c) or "(see report)")
          PY

      - name: Commit the RT report back ([skip ci])
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- results/import_rt_report.json specs/mathsources/mathlib/queue.jsonl.gz)" ]; then
            echo "no RT changes -- nothing to push"
            exit 0
          fi
          git config user.name "cgb-ci"
          git config user.email "cgb-ci@users.noreply.github.com"
          git add results/import_rt_report.json specs/mathsources/mathlib/queue.jsonl.gz
          git commit -m "ci(lean-rt): RT differential verdicts over authored readings [skip ci]"
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"

  # WP-LI0 (PLAN_LEAN_IMPORT.md): the whole-library enumeration + fragment-fit
  # census, gate C2 of the commissioning ladder.  Runs ONLY on a [lean-import]
  # push marker (never on the schedule): the local dev container's network
  # policy cannot fetch the toolchain, so this lane is where the queue/census
  # artifacts are actually produced.  The P-LI0-CENSUS tooth is enforced
  # in-lane: everything is built TWICE and byte-compared before anything is
  # committed back.  Commit-back carries [skip ci] -- no trigger loops.
  lean-import:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[lean-import]'))
    permissions:
      contents: write
    # OWN group (same rule as lean-smoke: sharing with `lean` would cancel one
    # lane with the other); superseded enumeration rounds supersede each other.
    concurrency:
      group: lean-import-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore the pinned toolchain + Mathlib cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Save the toolchain cache EVEN ON FAILURE (shakeout rounds must
              not re-fetch Mathlib every time)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('.lean-pins') }}

      - name: Python packages (the WP-LI0 tooling's imports)
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis z3-solver cvc5 pytest pydantic jsonschema pyyaml

      - name: Lean 4 + pinned Mathlib + lean4checker (setup.sh)
        run: bash setup.sh --with-lean --lean-only --skip-fresh

      - name: "Enumerate + census, TWICE (P-LI0-CENSUS: byte-identity is the gate)"
        run: |
          set -euo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          # defensive: this lane is useless without the WP-LI0 tooling on the ref
          test -f tools/enumerate_mathlib.py || { echo "FAIL: tools/enumerate_mathlib.py absent on this ref"; exit 1; }
          test -f buildloop/census.py || { echo "FAIL: buildloop/census.py absent on this ref"; exit 1; }
          python3 tools/enumerate_mathlib.py
          python3 -m buildloop.census
          mkdir -p /tmp/li0-run1
          cp specs/mathsources/mathlib/queue.jsonl.gz specs/mathsources/mathlib/census.json /tmp/li0-run1/
          python3 tools/enumerate_mathlib.py
          python3 -m buildloop.census
          cmp /tmp/li0-run1/queue.jsonl.gz specs/mathsources/mathlib/queue.jsonl.gz \
            || { echo "P-LI0-CENSUS FAIL: queue.jsonl.gz not byte-identical across runs"; exit 1; }
          cmp /tmp/li0-run1/census.json specs/mathsources/mathlib/census.json \
            || { echo "P-LI0-CENSUS FAIL: census.json not byte-identical across runs"; exit 1; }
          echo "P-LI0-CENSUS PASS: queue + census byte-identical across two builds"

      - name: Upload queue + census as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lean-import-li0-${{ github.run_id }}
          path: |
            specs/mathsources/mathlib/queue.jsonl.gz
            specs/mathsources/mathlib/census.json
          retention-days: 30

      - name: Commit the artifacts back to the triggering branch ([skip ci])
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- specs/mathsources/mathlib/queue.jsonl.gz specs/mathsources/mathlib/census.json)" ]; then
            echo "artifacts identical to what is already committed -- nothing to push"
            exit 0
          fi
          git config user.name "cgb-ci"
          git config user.email "cgb-ci@users.noreply.github.com"
          git add specs/mathsources/mathlib/queue.jsonl.gz specs/mathsources/mathlib/census.json
          PIN=$(grep '^MATHLIB_COMMIT=' .lean-pins | cut -d= -f2 | cut -c1-12)
          git commit -m "ci(lean-import): enumeration + census artifacts at pin ${PIN} [skip ci]"
          # the branch may have moved during the (long) enumeration -- rebase the
          # artifact commit onto the current tip rather than failing non-ff.
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
