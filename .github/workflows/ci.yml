name: regression

# Runs the LLM-free regression gate (`run_regression.py --fast`): the full
# pytest suite, the guarded scripts, and every REQUIRES_LLM=False demo. The
# LLM-dependent items (synthesize / conversion / rung end-to-end arcs) are
# excluded by design -- they need the Claude CLI + an API key, which CI has not.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"   # weekly: the Lean toolchain job

jobs:
  fast:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      CGB_KSC_CLASSPATH: /opt/ksc/lib/*
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17 (Kaitai Struct compiler + Maven)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up .NET 8 (Dafny)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Python packages (pinned to setup.sh)
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis kaitaistruct z3-solver cvc5 tree_sitter pyyaml \
            pydantic jsonschema hypothesis-jsonschema pytest
          # flloat 0.3.0 (LTLf->DFA) is unmaintained -- pin its whole closure.
          pip install "flloat==0.3.0" "pythomata==0.3.2" "lark-parser==0.12.0" "sympy==1.14"

      - name: Runtime packages into the SYSTEM python3 (for the code sandbox)
        run: |
          # The OS-level sandbox (sandbox/__init__.py) runs emitted code as
          # nobody with a CLEARED environment and PATH=/usr/bin:/bin:/usr/local/bin
          # -- so generated codecs/validators execute under `/usr/bin/python3`
          # (the system interpreter), NOT the setup-python venv above.  Without
          # the runtime libs installed there, every sandboxed channel fails with
          # `ModuleNotFoundError: No module named 'hypothesis'/'pydantic'` (the
          # pre-existing red the solver channels never showed).  Install the
          # imports emitted code needs into the system interpreter, world-readable
          # so the nobody uid can load them.
          # --ignore-installed: some transitive deps (e.g. typing_extensions)
          # are debian/apt-managed with no RECORD file, so pip cannot uninstall
          # them to upgrade -- install the needed versions alongside into
          # /usr/local/lib (which shadows /usr/lib for the system interpreter)
          # instead of trying to replace the apt copies.
          sudo /usr/bin/python3 -m pip install --break-system-packages \
            --ignore-installed \
            hypothesis kaitaistruct pydantic jsonschema hypothesis-jsonschema \
            pyyaml tree_sitter z3-solver cvc5
          # The LTLf monitor's ref_stepper.py drives flloat's own automaton and
          # ALSO runs in the sandbox (monitor-cert's monitor-vs-flloat channel),
          # so the flloat closure must be importable by /usr/bin/python3 too.
          sudo /usr/bin/python3 -m pip install --break-system-packages \
            --ignore-installed \
            "flloat==0.3.0" "pythomata==0.3.2" "lark-parser==0.12.0" "sympy==1.14"

      - name: Dafny (Z3-backed verifier)
        run: |
          dotnet tool install --global dafny --version 4.*
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Kaitai Struct compiler 0.11 jars via Maven
        run: |
          sudo mkdir -p /opt/ksc
          cat > /tmp/ksc-pom.xml <<'POM'
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>local</groupId><artifactId>ksc-fetch</artifactId><version>1</version>
            <dependencies>
              <dependency><groupId>io.kaitai</groupId><artifactId>kaitai-struct-compiler_2.13</artifactId><version>0.11</version></dependency>
            </dependencies>
          </project>
          POM
          sudo cp /tmp/ksc-pom.xml /opt/ksc/pom.xml
          (cd /opt/ksc && sudo mvn -q dependency:copy-dependencies -DoutputDirectory=/opt/ksc/lib)
          ls /opt/ksc/lib

      - name: tree-sitter CLI
        run: |
          cargo install tree-sitter-cli --version ^0.22 --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Regression gate (--fast)
        run: |
          # The code-execution sandbox (sandbox/__init__.py) isolates emitted
          # code with `unshare --net --mount --pid` + a setuid to nobody, which
          # needs root -- the GitHub runner is non-root and Ubuntu 24.04 blocks
          # unprivileged user namespaces, so every sandboxed channel fails as the
          # runner user. Run the gate as root with the tool paths pinned (the
          # SMT/proof channels pass either way; only the sandbox needs this).
          sudo env \
            "PATH=$PATH:$HOME/.cargo/bin:$HOME/.dotnet/tools" \
            "CGB_KSC_CLASSPATH=/opt/ksc/lib/*" \
            "CGB_TREE_SITTER=$HOME/.cargo/bin/tree-sitter" \
            "CGB_DAFNY=$HOME/.dotnet/tools/dafny" \
            "$(command -v python)" run_regression.py --fast

  # F0: the Lean 4 + pinned-Mathlib toolchain job (FORMALIZATION.md).
  # Opt-in (manual dispatch) or weekly -- NOT on every push: the fast gate
  # stays Lean-free by design (run_regression --fast is Lean-free, F0.1), and
  # this job's first runs are expected to need shakeout (the backend code has
  # never executed against a real toolchain).  `lake exe cache get` downloads
  # Mathlib's PREBUILT oleans, so this is a fetch (~5 GB), not an hours-long
  # source build; the once-per-pin `lean4checker --fresh` recertification is
  # deliberately deferred (--skip-fresh) with the honest note L4 requires --
  # run setup WITHOUT --skip-fresh on a many-core host to discharge it.
  lean:
    # also fires on a push whose commit message carries the [lean-ci] marker --
    # workflow_dispatch needs actions:write, which the bot token lacks.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[lean-ci]'))
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache the pinned toolchain + Mathlib (keyed on the pin in common.py)
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lean
          key: lean-${{ runner.os }}-${{ hashFiles('common.py') }}
          restore-keys: lean-${{ runner.os }}-

      - name: Python packages (the Lean-gated tests' imports)
        run: |
          python -m pip install --upgrade pip
          pip install hypothesis z3-solver cvc5 pytest pydantic jsonschema pyyaml

      - name: Lean 4 + pinned Mathlib + lean4checker (setup.sh)
        run: ./setup.sh --with-lean --lean-only --skip-fresh

      - name: "Lean-gated tests + the five-teeth demo (root -- the sandbox needs unshare)"
        run: |
          # sudo changes $HOME, so the elan-derived toolchain dir must be pinned
          # explicitly (common.LEAN_TOOLCHAIN_DIR expands ~ at import time).
          TC="$HOME/.elan/toolchains/leanprover--lean4---v4.15.0"
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" -m pytest \
            tests/test_lean_backend.py tests/test_statement_cert.py \
            tests/test_formalize_pipeline.py -q
          sudo env \
            "PATH=$HOME/.elan/bin:$PATH" \
            "CGB_LEAN_TOOLCHAIN_DIR=$TC" \
            "$(command -v python)" demo_formalize.py
