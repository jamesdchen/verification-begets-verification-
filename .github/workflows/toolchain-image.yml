# Builds + publishes the CI/devcontainer toolchain image (ci/Dockerfile) to
# ghcr.  Fires only when the image definition changes, or manually.
name: toolchain-image
on:
  workflow_dispatch:
  push:
    paths:
      - "ci/Dockerfile"
      - ".github/workflows/toolchain-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build
        run: docker build -t "ghcr.io/${{ github.repository }}/toolchain:latest" -f ci/Dockerfile .
      - name: Smoke-test the image (every checker present + sandbox works)
        run: |
          docker run --rm --privileged -v "$PWD:/workspace" \
            "ghcr.io/${{ github.repository }}/toolchain:latest" bash -c '
              set -e
              python3 -c "import hypothesis, pydantic, z3, cvc5, flloat, yaml"
              dafny --version | head -1
              ls /opt/ksc/lib | head -2
              /root/.cargo/bin/tree-sitter --version
              cd /workspace && python3 -m pytest tests/test_math_reading.py -q | tail -1'
      - name: Push
        run: docker push "ghcr.io/${{ github.repository }}/toolchain:latest"
