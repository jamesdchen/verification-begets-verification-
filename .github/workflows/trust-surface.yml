# The mechanical guard behind cycle-PR self-merge (C3_PROMPTS.md
# "Architecture").  Lives in its OWN workflow with NO paths filter so that a
# MISSING trust-surface check on a driver PR has exactly one meaning -- the
# CI config was altered -- and never the innocent one ("the PR touched only
# path-ignored files", which the regression workflow's paths-ignore would
# otherwise produce).  The driver's SELF-MERGE rule refuses to merge on a
# red OR MISSING trust-surface check, so a claude/c3-* or claude/p-* PR
# touching a ceremony-reserved surface always waits for the maintainer.
name: trust-surface
on:
  pull_request:

jobs:
  # No branch filter: routine sessions ship on PLATFORM-ASSIGNED claude/<words>
  # branches (PR #37 shipped on claude/brave-gauss-mwmi6v), so branch names
  # cannot discriminate cycle PRs.  Path-based and seconds-cheap, it runs on
  # every PR; MISSING keeps exactly one meaning: the CI config was altered
  # (or the PR predates this workflow).
  trust-surface:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if a ceremony-reserved surface is touched
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")
          echo "changed files:"; echo "$CHANGED"
          PROTECTED='^(kernel/certs\.py|TRUST\.md|buildloop/growth_protocol\.py|setup\.sh|ci/|\.claude/|\.github/)'
          if echo "$CHANGED" | grep -E "$PROTECTED"; then
            echo "trust-surface FAIL: ceremony-reserved paths changed (listed above)."
            echo "Self-merge is forbidden; a maintainer must review and merge this PR."
            echo "(For claude/p-* purchase PRs this is EXPECTED: the growth registry"
            echo " lives in buildloop/growth_protocol.py, so every full-bill purchase"
            echo " trips this check by design and is maintainer-merged.)"
            exit 1
          fi
          # The un-park fence (the decision lane's mechanical handoff).  The
          # park ledger (results/frontier_parks.jsonl) demotes subjects a
          # governance DECISION holds out of the intake window.  PARKING is
          # ordinary driver work -- tools/frontier_parks.py only ever APPENDS
          # rows.  LIFTING a park (--lift rewrites the file with rows
          # removed) IS the maintainer's decision, so a diff that removes or
          # edits any existing ledger row goes red here: the un-park rides a
          # `C3 decision:` PR whose red trust-surface is the sign-off
          # handoff, exactly as a purchase PR's growth_protocol.py touch is.
          if echo "$CHANGED" | grep -qx 'results/frontier_parks\.jsonl'; then
            MB=$(git merge-base \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")
            git show "$MB:results/frontier_parks.jsonl" > /tmp/parks_base.jsonl 2>/dev/null || : > /tmp/parks_base.jsonl
            git show "${{ github.event.pull_request.head.sha }}:results/frontier_parks.jsonl" > /tmp/parks_head.jsonl 2>/dev/null || : > /tmp/parks_head.jsonl
            REMOVED=$(comm -23 <(sort /tmp/parks_base.jsonl) <(sort /tmp/parks_head.jsonl))
            if [ -n "$REMOVED" ]; then
              echo "trust-surface FAIL: park-ledger rows removed or edited (an un-park):"
              echo "$REMOVED"
              echo "Lifting a park is a maintainer DECISION.  Self-merge is forbidden;"
              echo "the maintainer's merge of this PR is the decision that lifts it."
              echo "(For a \`C3 decision:\` PR this red is EXPECTED -- it is the handoff.)"
              exit 1
            fi
            echo "park ledger touched: append-only (parking is driver work) -- OK"
          fi
          echo "trust-surface PASS: no ceremony-reserved paths touched"

  # The maintainer-review NARROWER for full-bill purchases (firehose
  # discipline applied to the maintainer): verifies the bill's mechanical
  # items -- ceremony scope limited to growth_protocol.py, ANTI_LIST
  # byte-identical, re-census delta receipt present -- so the human review
  # collapses to the intent question.  Batteries/canary/registry-shape/suite
  # are already the fast gate's teeth; this never re-implements them.
  bill-manifest:
    if: startsWith(github.event.pull_request.title, 'C3 purchase')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify the mechanical bill items
        run: |
          set -euo pipefail
          python3 tools/purchase_bill_manifest.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            | tee -a "$GITHUB_STEP_SUMMARY"
